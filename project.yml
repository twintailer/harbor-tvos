name: Harbor
options:
  bundleIdPrefix: app.harbor
  deploymentTarget:
    tvOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.0"
packages:
  MPVKit:
    url: https://github.com/mpvkit/MPVKit
    exactVersion: 0.41.0
targets:
  HarborTV:
    type: application
    platform: tvOS
    sources:
      - path: Sources
      - path: Assets.xcassets
    dependencies:
      - package: MPVKit
        # GPL variant — the one StremioX ships on real Apple TVs. The plain MPVKit
        # product's tvOS slice initialized NO audio output at all ("AO —" on device);
        # with -GPL the default driver chain works.
        product: MPVKit-GPL
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Harbor
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UIRequiredDeviceCapabilities: [arm64]
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UIUserInterfaceStyle: Dark
        # Explicit UIScene adoption — tvOS 26 runs legacy-lifecycle apps in a
        # compatibility mode that has caused AV glitches (StremioX sets this too).
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.harbor.tvos
        PRODUCT_NAME: Harbor
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        TARGETED_DEVICE_FAMILY: "3"
        ENABLE_BITCODE: false
        CODE_SIGNING_ALLOWED: false
        CODE_SIGN_IDENTITY: ""
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
